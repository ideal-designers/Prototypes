<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permission Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-text:    #1f2129;
  --secondary-text:  #5f616a;
  --placeholder:     #9c9ea8;
  --stone-0:         #ffffff;
  --stone-200:       #f7f7f7;
  --stone-300:       #eceef9;
  --stone-400:       #dee0eb;
  --stone-500:       #bbbdc8;
  --stone-900:       #40424b;
  --primary-500:     #2c9c74;
  --primary-200:     #7fdea5;
  --primary-highligt:#ebf8ef;
  --divider:         #dee0eb;
  --icon-main:       #5f616a;
  --orange-500:      #f4640c;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background: #fff;
  color: var(--primary-text);
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
}

.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Left sidebar ── */
.sidebar {
  width: 72px;
  flex-shrink: 0;
  background: var(--stone-200);
  border-right: 1px solid var(--divider);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
}

.sidebar-project {
  width: 72px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--divider);
  flex-shrink: 0;
}

.project-badge {
  width: 40px; height: 40px;
  background: var(--orange-500);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; font-weight: 400; line-height: 24px;
}

.sidebar-nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding-top: 24px;
}

.nav-icon {
  width: 72px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

.nav-icon img { width: 24px; height: 24px; object-fit: contain; }

.sidebar-bottom {
  padding-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 24px 20px 20px 20px;
  width: 100%;
  gap: 0;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.vdr-logo { width: 32px; height: 32px; }
.collapse-icon { width: 16px; height: 16px; cursor: pointer; }

/* ── Main content ── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── Header ── */
.header {
  height: 64px;
  flex-shrink: 0;
  background: var(--stone-0);
  border-bottom: 1px solid var(--stone-400);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
}

.breadcrumb { display: flex; align-items: center; }

.breadcrumb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 8px 8px 0;
  font-size: 15px;
  font-weight: 600;
  color: var(--secondary-text);
  line-height: 20px;
}

.breadcrumb-chevron {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
}

.breadcrumb-chevron img { width: 16px; height: 16px; transform: rotate(180deg); }

.breadcrumb-item.active { color: var(--primary-text); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 24px;
}

.help-icon { width: 24px; height: 24px; cursor: pointer; }
.help-icon img { width: 24px; height: 24px; }

.avatar {
  width: 40px; height: 40px;
  border-radius: 40px;
  background: var(--stone-300);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--primary-text); font-weight: 400; cursor: pointer;
}

/* ── Body ── */
.body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 24px;
  background: var(--stone-0);
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.btn-outline {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 40px;
  padding: 0 16px;
  border: 1px solid var(--stone-500);
  border-radius: 4px;
  background: var(--stone-0);
  font-size: 15px;
  color: var(--stone-900);
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Open Sans', sans-serif;
}

.btn-outline:hover { border-color: var(--primary-500); }

.btn-text {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  color: var(--primary-500);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Open Sans', sans-serif;
}

.btn-icon-wrap {
  width: 16px; height: 16px;
  position: relative;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}

.btn-icon-wrap img { width: 16px; height: 16px; object-fit: contain; }

/* ── Panels ── */
.panels {
  display: flex;
  gap: 24px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Tree panel ── */
.tree-panel {
  width: 320px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-radius: 4px;
  overflow: hidden;
}

.tree-header {
  height: 48px;
  background: var(--stone-200);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  flex-shrink: 0;
}

.tree-header-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary-text);
}

.tree-header-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  color: var(--primary-500);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Open Sans', sans-serif;
}

.tree-header-btn img { width: 16px; height: 16px; }

.search-wrap {
  height: 40px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
}

.search-field {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  height: 32px;
  border: 1px solid var(--stone-500);
  border-radius: 4px;
  padding: 8px 12px;
  background: var(--stone-0);
  transition: border-color 0.15s;
}

.search-field:focus-within {
  border-color: var(--primary-500);
  box-shadow: 0 0 0 2px rgba(44, 156, 116, 0.1);
}

.search-icon { width: 14px; height: 14px; flex-shrink: 0; }
.search-icon img { width: 14px; height: 14px; }

.search-field input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--primary-text);
  font-family: 'Open Sans', sans-serif;
  background: transparent;
  line-height: 20px;
}

.search-field input::placeholder { color: var(--placeholder); }

.clear-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border: none; background: none;
  cursor: pointer;
  color: var(--stone-500);
  font-size: 11px;
  border-radius: 50%;
  flex-shrink: 0;
  line-height: 1;
}

.clear-btn:hover { background: var(--stone-300); color: var(--stone-900); }
.search-field.has-value .clear-btn { display: flex; }

.tree-list {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 8px;
}

.tree-item {
  display: flex;
  align-items: center;
  height: 40px;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s;
}

.tree-item:hover { background: var(--stone-200); }
.tree-item.selected { background: var(--primary-highligt); }

.tree-item-content {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.file-icon {
  width: 20px; height: 20px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}

.file-icon img { width: 20px; height: 18px; object-fit: contain; }

.item-index {
  font-size: 14px;
  color: var(--primary-text);
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 20px;
}

.item-name {
  font-size: 14px;
  color: var(--primary-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  line-height: 20px;
}

.item-name mark {
  background: rgba(44, 156, 116, 0.18);
  color: var(--primary-500);
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}

.tree-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--placeholder);
  font-size: 14px;
  display: none;
}

/* ── Permission table ── */
.table-panel {
  flex: 1;
  min-width: 0;
  display: flex;
  overflow: hidden;
  align-self: flex-start;
}

/* Expand chevrons column */
.table-expand-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.cell-header-expand {
  width: 32px; height: 48px;
  background: var(--stone-200);
  border-radius: 4px 0 0 4px;
}

.cell-expand {
  width: 32px; height: 40px;
  display: flex; align-items: center;
  padding-left: 16px;
}

.cell-expand img { width: 16px; height: 16px; }

/* Groups column */
.table-group-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.cell-header-group {
  height: 48px;
  background: var(--stone-200);
  display: flex; align-items: center;
  padding: 14px 8px 14px 16px;
}

.cell-header-group span {
  font-size: 14px;
  font-weight: 600;
  color: #343a40;
}

.table-groups {
  display: flex;
  flex-direction: column;
  padding-top: 8px;
}

.cell-group {
  height: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
}

.group-icon { width: 16px; height: 16px; flex-shrink: 0; }
.group-icon img { width: 16px; height: 16px; object-fit: contain; }

.cell-group span {
  font-size: 14px;
  color: var(--primary-text);
  white-space: nowrap;
}

/* Permission columns */
.table-perm-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.perm-header {
  height: 48px;
  background: var(--stone-200);
  display: flex;
  align-items: stretch;
  border-radius: 0 4px 4px 0;
}

.perm-spacer {
  width: 28px;
  flex-shrink: 0;
  background: var(--stone-200);
}

.perm-header-cell {
  width: 62px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 0;
  gap: 2px;
}

.perm-header-cell:last-child { border-radius: 0 4px 4px 0; }

.perm-header-icon {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

.perm-header-icon img { width: 16px; height: 16px; object-fit: contain; }

.perm-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-text);
  white-space: nowrap;
}

.perm-rows { display: flex; flex-direction: column; }

.perm-row {
  height: 40px;
  display: flex;
  align-items: center;
  padding: 12px 4px;
}

.slider-track {
  height: 16px;
  display: flex;
  border-radius: 4px;
  overflow: hidden;
}

.slider-block {
  width: 62px;
  height: 16px;
  border: 1px solid var(--stone-500);
  border-left: none;
  flex-shrink: 0;
}

.slider-block:first-child {
  border-left: 1px solid var(--stone-500);
  border-radius: 4px 0 0 4px;
}

.slider-block:last-child { border-radius: 0 4px 4px 0; }

.s-light  { background: var(--primary-200); }
.s-active { background: var(--primary-500); }
.s-none   { background: var(--stone-300); }

/* Slider interactivity */
.slider-block {
  cursor: pointer;
  transition: filter 0.1s;
}
.slider-block:hover { filter: brightness(0.9); }

/* Bottom save bar */
.save-bar {
  position: fixed;
  bottom: 0;
  left: 72px;
  right: 0;
  background: var(--stone-0);
  border-top: 1px solid var(--divider);
  display: none;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  z-index: 200;
}
.save-bar.visible { display: flex; }

.btn-cancel-bar {
  height: 40px;
  width: 80px;
  background: var(--stone-0);
  border: 1px solid var(--stone-500);
  border-radius: 4px;
  font-family: 'Open Sans', sans-serif;
  font-size: 15px;
  color: var(--stone-900);
  cursor: pointer;
}
.btn-cancel-bar:hover { background: var(--stone-200); }

.btn-save-bar {
  height: 40px;
  width: 80px;
  background: var(--primary-500);
  border: none;
  border-radius: 4px;
  font-family: 'Open Sans', sans-serif;
  font-size: 15px;
  color: #fff;
  cursor: pointer;
}
.btn-save-bar:hover { background: #258a64; }

/* Pinned item dot indicator */
.item-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--orange-500);
  flex-shrink: 0;
  margin-left: auto;
}

/* Divider between pinned and filtered results */
.tree-divider {
  height: 1px;
  background: var(--divider);
  margin: 0 0 4px;
  flex-shrink: 0;
}

/* Scrollbar */
.tree-list::-webkit-scrollbar { width: 4px; }
.tree-list::-webkit-scrollbar-track { background: transparent; }
.tree-list::-webkit-scrollbar-thumb { background: var(--stone-400); border-radius: 2px; }
</style>
</head>

<!-- Bottom save bar -->
<div class="save-bar" id="saveBar">
  <button class="btn-cancel-bar" id="cancelBtn">Cancel</button>
  <button class="btn-save-bar" id="saveBtn">Save</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const FIGMA = {
  folder: 'https://www.figma.com/api/mcp/asset/70bd5d23-7f9e-498c-96ad-0cae81f65cb6',
  xlsx:   'https://www.figma.com/api/mcp/asset/ffb649f3-f49b-4b90-909e-e9572587d512',
  pdf:    'https://www.figma.com/api/mcp/asset/0f856595-ca58-45a7-a2aa-33d8416e0049',
  doc:    'https://www.figma.com/api/mcp/asset/9a533b4f-1a2b-4707-ac67-55f78a0eea2e',
};

// perms: [All groups, White Co., Yellow Co., Red Co., Green Co., Blue co.]
// levels: 1=Fence 2=View 3=Encrypted 4=PDF 5=Original 6=Upload 7=Manage 0=No access
const TREE_ITEMS = [
  { id:1, index:'1',   name:'Stage folder',                        type:'folder', perms:[6,6,5,4,3,6] },
  { id:2, index:'2',   name:'Organizational chart and manage',     type:'folder', perms:[7,7,6,5,4,5] },
  { id:3, index:'3.1', name:'Corporate DD — Product and Services', type:'folder', perms:[5,6,4,2,3,5] },
  { id:4, index:'4',   name:'Financial DD — Accounts Receivables', type:'folder', perms:[6,6,5,3,4,6] },
  { id:5, index:'5',   name:'Key contacts by function',            type:'xlsx',   perms:[4,5,3,1,2,4] },
  { id:6, index:'6',   name:'Tax accounting.xlsx',                 type:'xlsx',   perms:[5,5,4,2,3,5] },
  { id:7, index:'7',   name:'Tax returns.pdf',                     type:'pdf',    perms:[3,4,3,1,0,3] },
  { id:8, index:'8',   name:'Registration with tax authorities',   type:'doc',    perms:[6,7,5,4,3,6] },
];

const GROUPS = [
  { name:'All groups' },
  { name:'White Co.'  },
  { name:'Yellow Co.' },
  { name:'Red Co.'    },
  { name:'Green Co.'  },
  { name:'Blue co.'   },
];

// ── State ─────────────────────────────────────────────────────────────────────
let selectedId  = 1;
let pendingPerms = null; // Map<itemId, perms[]> — unsaved changes

function currentPerms(id){
  return (pendingPerms && pendingPerms[id]) || TREE_ITEMS.find(t => t.id === id).perms.slice();
}

function hasUnsavedChanges(){
  if (!pendingPerms) return false;
  return Object.keys(pendingPerms).length > 0;
}

function showSaveBar(){ document.getElementById('saveBar').classList.add('visible'); }
function hideSaveBar(){ document.getElementById('saveBar').classList.remove('visible'); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text, q){
  if (!q) return esc(text);
  return esc(text).replace(new RegExp(`(${escRe(q)})`,'gi'),'<mark>$1</mark>');
}

// ── Render tree ───────────────────────────────────────────────────────────────
function treeItemHTML(item, q, pinned) {
  const isDirty = pendingPerms && pendingPerms[item.id];
  const dot = pinned && isDirty ? '<span class="item-dot"></span>' : '';
  return `
    <div class="tree-item ${item.id === selectedId ? 'selected' : ''}"
         data-id="${item.id}" onclick="selectItem(${item.id})">
      <div class="tree-item-content">
        <div class="file-icon"><img src="${FIGMA[item.type]}" alt=""></div>
        <span class="item-index">${esc(item.index)}</span>
        <span class="item-name">${highlight(item.name, q)}</span>
        ${dot}
      </div>
    </div>`;
}

function renderTree(query){
  const list  = document.getElementById('treeList');
  const empty = document.getElementById('treeEmpty');
  const q     = (query || '').trim().toLowerCase();

  const selectedItem = TREE_ITEMS.find(t => t.id === selectedId);
  const hasDirty     = pendingPerms && pendingPerms[selectedId];
  const shouldPin    = q && hasDirty; // pin only when searching AND has unsaved changes

  const filtered = TREE_ITEMS.filter(item => {
    if (shouldPin && item.id === selectedId) return false; // exclude from main list
    return !q || item.name.toLowerCase().includes(q) || item.index.toLowerCase().includes(q);
  });

  if (!shouldPin && !filtered.length){
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  let html = '';

  if (shouldPin && selectedItem) {
    html += treeItemHTML(selectedItem, q, true);
    html += '<div class="tree-divider"></div>';
  }

  if (filtered.length) {
    html += filtered.map(item => treeItemHTML(item, q, false)).join('');
  } else if (shouldPin) {
    // only pinned item matches — show empty message inline
    html += `<div class="tree-empty" style="display:block">No other matches found</div>`;
  }

  list.innerHTML = html;
}

function selectItem(id){
  selectedId = id;
  renderTree(document.getElementById('searchInput').value);
  renderPermRows();
  const item = TREE_ITEMS.find(t => t.id === id);
  const titleEl = document.getElementById('permTitle');
  if (titleEl && item) titleEl.textContent = item.name;
}

// ── Render permission sliders ─────────────────────────────────────────────────
function renderPermRows(){
  const N = 7;
  const perms = currentPerms(selectedId);
  document.getElementById('permRows').innerHTML = GROUPS.map((g, gi) => {
    const level = perms[gi];
    const blocks = Array.from({length: N}, (_, i) => {
      const pos = i + 1;
      const cls = level === 0 ? 's-none'
                : pos < level  ? 's-light'
                : pos === level ? 's-active'
                : 's-none';
      return `<div class="slider-block ${cls}" onclick="setLevel(${gi},${pos})"></div>`;
    }).join('');
    return `<div class="perm-row"><div class="slider-track">${blocks}</div></div>`;
  }).join('');
}

function setLevel(groupIndex, newLevel){
  if (!pendingPerms) pendingPerms = {};
  if (!pendingPerms[selectedId]) pendingPerms[selectedId] = currentPerms(selectedId);
  pendingPerms[selectedId][groupIndex] = newLevel;
  renderPermRows();
  renderTree(document.getElementById('searchInput').value);
  showSaveBar();
}

// ── Search wiring ─────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchField = document.getElementById('searchField');
const clearBtn    = document.getElementById('clearBtn');

searchInput.addEventListener('input', () => {
  const q = searchInput.value;
  searchField.classList.toggle('has-value', q.length > 0);
  renderTree(q);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchField.classList.remove('has-value');
  renderTree('');
  searchInput.focus();
});

// ── Cancel / Save ─────────────────────────────────────────────────────────────
document.getElementById('cancelBtn').addEventListener('click', () => {
  pendingPerms = null;
  hideSaveBar();
  renderPermRows();
  renderTree(document.getElementById('searchInput').value);
});

document.getElementById('saveBtn').addEventListener('click', () => {
  if (pendingPerms) {
    Object.entries(pendingPerms).forEach(([id, perms]) => {
      const item = TREE_ITEMS.find(t => t.id === Number(id));
      if (item) item.perms = perms.slice();
    });
  }
  pendingPerms = null;
  hideSaveBar();
  renderPermRows();
  renderTree(document.getElementById('searchInput').value);
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderTree('');
renderPermRows();
</script>
</body>
</html>
